name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-android-native-artifacts:
    name: Build Android native artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.89.0
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          link-to-sdk: false

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Android Rust artifacts from the release commit
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          RUST_ARTIFACT_SOURCE_COMMIT: ${{ github.sha }}
        run: bash scripts/build-rust-artifacts.sh android

      - name: Upload immutable Android native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-native-artifacts
          # upload-artifact roots at the LCA of these paths (packages/module).
          include-hidden-files: true
          path: |
            packages/module/android/src/main/jniLibs
            packages/module/.rust-artifacts/android-native-artifacts.json
          if-no-files-found: error
          retention-days: 30

  build-apple-native-artifacts:
    name: Build Apple native artifacts
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.89.0
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Build Apple Rust artifacts from the release commit
        env:
          RUST_ARTIFACT_SOURCE_COMMIT: ${{ github.sha }}
        run: bash scripts/build-rust-artifacts.sh apple

      - name: Upload immutable Apple native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apple-native-artifacts
          # upload-artifact roots at the LCA of these paths (packages/module).
          include-hidden-files: true
          path: |
            packages/module/ios/rust
            packages/module/.rust-artifacts/apple-native-artifacts.json
          if-no-files-found: error
          retention-days: 30

  smoke-android-native-artifacts:
    name: Smoke-test Android packaged natives
    needs:
      - build-android-native-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          link-to-sdk: false

      - name: Download immutable Android native artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-native-artifacts
          # Artifact root is packages/module (upload-artifact LCA).
          path: packages/module

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter expo-easy-passkey build

      - name: Smoke-test packed Android native artifacts
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: bash scripts/smoke-test-packaged-native-artifacts.sh --platform android

  smoke-apple-native-artifacts:
    name: Smoke-test Apple packaged natives
    needs:
      - build-apple-native-artifacts
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Download immutable Apple native artifacts
        uses: actions/download-artifact@v4
        with:
          name: apple-native-artifacts
          # Artifact root is packages/module (upload-artifact LCA).
          path: packages/module

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter expo-easy-passkey build

      - name: Smoke-test packed Apple native artifacts
        run: bash scripts/smoke-test-packaged-native-artifacts.sh --platform apple

  check-native-artifact-drift:
    name: Check committed native artifact drift
    needs:
      - build-android-native-artifacts
      - build-apple-native-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download immutable Android native artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-native-artifacts
          path: ${{ runner.temp }}/trusted-android

      - name: Download immutable Apple native artifacts
        uses: actions/download-artifact@v4
        with:
          name: apple-native-artifacts
          path: ${{ runner.temp }}/trusted-apple

      - name: Compare committed Android natives to trusted build outputs
        run: >
          bash scripts/check-native-artifact-drift.sh
          --committed-root packages/module
          --generated-root "${{ runner.temp }}/trusted-android"
          --platform android

      - name: Compare committed Apple natives to trusted build outputs
        run: >
          bash scripts/check-native-artifact-drift.sh
          --committed-root packages/module
          --generated-root "${{ runner.temp }}/trusted-apple"
          --platform apple

  release:
    name: Release
    needs:
      - smoke-android-native-artifacts
      - smoke-apple-native-artifacts
      - check-native-artifact-drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - uses: dtolnay/rust-toolchain@1.89.0

      - name: Download immutable Android native artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-native-artifacts
          path: ${{ runner.temp }}/trusted-android

      - name: Download immutable Apple native artifacts
        uses: actions/download-artifact@v4
        with:
          name: apple-native-artifacts
          path: ${{ runner.temp }}/trusted-apple

      - name: Stage trusted natives for publication
        run: >
          bash scripts/prepare-trusted-native-artifacts.sh
          --package-dir packages/module
          --android-from "${{ runner.temp }}/trusted-android"
          --apple-from "${{ runner.temp }}/trusted-apple"
          --expected-source-commit "${{ github.sha }}"
          --evidence-output packages/module/.rust-artifacts/release-evidence.json

      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-native-evidence
          include-hidden-files: true
          path: packages/module/.rust-artifacts/release-evidence.json
          if-no-files-found: error
          retention-days: 30

      - run: pnpm install --frozen-lockfile
      - run: pnpm rust:fmt
      - run: pnpm rust:clippy
      - run: pnpm bindgen:check
      - run: pnpm check
      - run: pnpm test:acceptance
      - run: pnpm verify:release-acceptance
      - run: pnpm build
      - run: pnpm pack:check

      - name: Pack module for evidence verification
        working-directory: packages/module
        run: npm pack --pack-destination "${{ runner.temp }}"

      - name: Verify packed natives match release evidence
        run: |
          TARBALL="$(ls "${{ runner.temp }}"/expo-easy-passkey-*.tgz | head -n 1)"
          bash scripts/prepare-trusted-native-artifacts.sh \
            --verify-tarball "$TARBALL" \
            --evidence-output packages/module/.rust-artifacts/release-evidence.json

      - uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_TOKEN || secrets.GITHUB_TOKEN }}
          LEFTHOOK: "0"
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
